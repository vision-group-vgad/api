name: API CI Pipeline

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]

env:
  NODE_VERSION: "22.16"

jobs:
  code-quality:
    name: Code Quality Checks
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: "npm"

      - name: Install dependencies
        run: npm ci

      - name: Run ESLint
        run: |
          npx eslint . > reports/eslint-report.txt || true
          echo "### 📏 ESLint Report" >> $GITHUB_STEP_SUMMARY
          tail -n 20 reports/eslint-report.txt >> $GITHUB_STEP_SUMMARY || echo "No lint issues found." >> $GITHUB_STEP_SUMMARY

  security-scan:
    name: Security Vulnerability Scan
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: "npm"

      - name: Install dependencies
        run: npm ci

      - name: Run npm audit and generate summary
        run: |
          mkdir -p reports
          npm audit --audit-level=moderate > reports/audit.txt || true
          echo "### 🔒 Security Audit Summary" >> $GITHUB_STEP_SUMMARY
          grep -A 10 'found' reports/audit.txt >> $GITHUB_STEP_SUMMARY || echo "No vulnerabilities found." >> $GITHUB_STEP_SUMMARY

  test:
    name: Run Tests
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: "npm"

      - name: Install dependencies
        run: npm ci

      - name: Run tests and generate summary
        run: |
          mkdir -p reports
          npm run test > reports/test-output.txt || true
          echo "### 🧪 Test Results" >> $GITHUB_STEP_SUMMARY
          tail -n 20 reports/test-output.txt >> $GITHUB_STEP_SUMMARY || echo "No test output captured." >> $GITHUB_STEP_SUMMARY
